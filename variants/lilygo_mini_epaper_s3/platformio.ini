[LilyGO_Mini_Epaper_S3]
extends = esp32_base
board = mini-epaper-s3
build_flags = ${esp32_base.build_flags}
              ${sensor_base.build_flags}
              -I variants/lilygo_mini_epaper_s3
              -D P_LORA_DIO_1=5
              -D P_LORA_NSS=7     ; CS
              -D P_LORA_RESET=21  ; RST
              -D P_LORA_BUSY=16
              -D P_LORA_SCLK=8
              -D P_LORA_MISO=6
              -D P_LORA_MOSI=17
              -D PIN_USER_BTN=0
              -D PIN_VBAT_READ=2
              -D ENCODER_LEFT=4
              -D ENCODER_RIGHT=3
              -D PIN_BOARD_SDA=18
              -D PIN_BOARD_SCL=9
              -D SX126X_CURRENT_LIMIT=140
              -D RADIO_CLASS=CustomSX1262
              -D WRAPPER_CLASS=CustomSX1262Wrapper
              -D LORA_TX_POWER=22
              -D SX126X_RX_BOOSTED_GAIN=1
              ; -D UI_HAS_JOYSTICK=1
              -D DISPLAY_CLASS=GxEPDDisplay
              -D EINK_DISPLAY_MODEL=GxEPD2_102
              -D PIN_DISPLAY_CS=13
              -D PIN_DISPLAY_DC=12
              -D PIN_DISPLAY_SCLK=14
              -D PIN_DISPLAY_RST=11
              -D PIN_DISPLAY_BUSY=10
              -D PIN_DISPLAY_MISO=-1
              -D PIN_DISPLAY_MOSI=15
              -D PIN_DISPLAY_EN=42
              -D EINK_WIDTH=80
              -D EINK_HEIGHT=128
              -D EINK_SCALE_X=1
              -D EINK_SCALE_Y=1
              -D EINK_X_OFFSET=0
              -D EINK_Y_OFFSET=0
              -D AUTO_OFF_MILLIS=0

build_src_filter = ${esp32_base.build_src_filter}
                   +<helpers/esp32/*.cpp>
                   +<helpers/ui/GxEPDDisplay.cpp>
                   +<helpers/ui/MomentaryButton.cpp>
                   +<../variants/lilygo_mini_epaper_s3>
lib_deps =
    ${esp32_base.lib_deps}
    adafruit/Adafruit EPD @ 4.6.1
    adafruit/RTClib @ ^2.1.3
    adafruit/Adafruit SSD1306 @ ^2.5.13
    zinggjm/GxEPD2 @ ^1.6.2
    bakercp/CRC32 @ ^2.0.0
    densaugeo/base64 @ ~1.4.0

[env:LilyGO_Mini_Epaper_S3_bot_ping]
extends = LilyGO_Mini_Epaper_S3
build_flags =
    ${LilyGO_Mini_Epaper_S3.build_flags}
    -D MAX_CONTACTS=350
    -D MAX_GROUP_CHANNELS=40
build_src_filter = ${LilyGO_Mini_Epaper_S3.build_src_filter}
                   +<../examples/simple_bot_ping/*.cpp>
lib_deps =
    ${LilyGO_Mini_Epaper_S3.lib_deps}

[env:LilyGO_Mini_Epaper_S3_companion_radio_usb]
extends = LilyGO_Mini_Epaper_S3
build_flags =
    ${LilyGO_Mini_Epaper_S3.build_flags}
    -I examples/companion_radio/ui-new
    -D MAX_CONTACTS=350
    -D MAX_GROUP_CHANNELS=40
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${LilyGO_Mini_Epaper_S3.build_src_filter}
                   +<../examples/companion_radio/*.cpp>
                   +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
    ${LilyGO_Mini_Epaper_S3.lib_deps}

[env:LilyGO_Mini_Epaper_S3_companion_radio_ble]
extends = LilyGO_Mini_Epaper_S3
build_flags =
    ${LilyGO_Mini_Epaper_S3.build_flags}
    -I examples/companion_radio/ui-new
    -D MAX_CONTACTS=350
    -D MAX_GROUP_CHANNELS=40
    -D BLE_PIN_CODE=123456
    -D OFFLINE_QUEUE_SIZE=256
;  -D BLE_DEBUG_LOGGING=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${LilyGO_Mini_Epaper_S3.build_src_filter}
                   +<../examples/companion_radio/*.cpp>
                   +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
    ${LilyGO_Mini_Epaper_S3.lib_deps}

[env:LilyGO_Mini_Epaper_S3_companion_radio_wifi]
extends = LilyGO_Mini_Epaper_S3
build_flags =
    ${LilyGO_Mini_Epaper_S3.build_flags}
    -I examples/companion_radio/ui-new
    -D MAX_CONTACTS=350
    -D MAX_GROUP_CHANNELS=40
    -D WIFI_SSID='"XXX"'
    -D WIFI_PWD='"XXX"'
    -D OFFLINE_QUEUE_SIZE=256
;  -D WIFI_DEBUG_LOGGING=1
;  -D BLE_DEBUG_LOGGING=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${LilyGO_Mini_Epaper_S3.build_src_filter}
                   +<../examples/companion_radio/*.cpp>
                   +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
    ${LilyGO_Mini_Epaper_S3.lib_deps}

